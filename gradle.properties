# ─── Project-wide Gradle settings ────────────────────────────────────────
# These apply to every module and are checked into version control.

# JVM memory for the Gradle daemon (increase if build OOMs)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Run independent module tasks in parallel for faster builds
org.gradle.parallel=true
# Cache task outputs to speed up incremental builds
org.gradle.caching=true

# ─── AndroidX ────────────────────────────────────────────────────────────
android.useAndroidX=true

# ─── Kotlin ──────────────────────────────────────────────────────────────
kotlin.code.style=official

# ─── Resource namespacing ────────────────────────────────────────────────
# Each module gets its own R class containing only its own resources,
# preventing accidental cross-module resource references.
android.nonTransitiveRClass=true

# ─── JDK path ────────────────────────────────────────────────────────────
# Use Android Studio's bundled JBR (JetBrains Runtime) for Gradle builds.
# Remove or change this if you use a standalone JDK.
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr
